name: Price Sync Cron

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  sync_prices:
    runs-on: ubuntu-latest
    steps:
      - name: Call API Route to Sync Prices
        run: |
          curl -X GET 'https://dealzone.onrender.com/api/sync' \
          -H "x-sync-secret: ${{ secrets.CRON_SYNC_SECRET || 'dealzone-sync-key-v1' }}"
